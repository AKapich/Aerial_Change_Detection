model:
  encoder_name: "resnet34"
  encoder_weights: "imagenet"
  num_classes: 2

training:
  batch_size: 16
  num_epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  patch_size: 256
  num_workers: 4
  optimizer: "adamw"
  loss: "cross_entropy"
  class_weight_change: 10.0
  scheduler: "cosine"

data:
  root_dir: "data"

mlflow:
  experiment_name: "change-detection-baseline"
  run_name: "unet-resnet34"
